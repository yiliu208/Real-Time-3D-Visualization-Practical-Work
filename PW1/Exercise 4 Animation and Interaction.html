<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4 Animation and Interaction</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let scene, camera, renderer, controls;
        let ambientLight, mainLight;
        let gui;

        const robotState = {
            material: null,
            shoulderR: null, elbowR: null,
            shoulderL: null, elbowL: null,
            hipR: null, kneeR: null,
            hipL: null, kneeL: null
        };

        const animSettings = {
            enableFK: true, 
            enableTeleop: false,
            shoulderRX: 0,
            elbowRX: 0
        };
    
        // Exercise 1: Setting up the Kitchen Environment
        function Exercise1_Kitchen() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3, 3, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; 
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.setClearColor(0x000000, 0); 
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.maxPolarAngle = Math.PI / 2;
            controls.target.set(0, 1, 0);

            const textureLoader = new THREE.TextureLoader();
            const floorTexture = textureLoader.load('wood.jpg');
            floorTexture.wrapS = THREE.RepeatWrapping;
            floorTexture.wrapT = THREE.RepeatWrapping;
            floorTexture.repeat.set(4, 4); 

            const floorMaterial = new THREE.MeshStandardMaterial({ 
                map: floorTexture, 
                roughness: 0.8, 
                side: THREE.DoubleSide
            }); 
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), floorMaterial);
            floor.rotation.x = -Math.PI / 2; 
            floor.receiveShadow = true; 
            scene.add(floor);

            const wallTexture = textureLoader.load('wallpaper.jpg');
            wallTexture.colorSpace = THREE.SRGBColorSpace; 
            wallTexture.wrapS = THREE.RepeatWrapping;
            wallTexture.wrapT = THREE.RepeatWrapping;
            wallTexture.repeat.set(4, 2); 

            const wallMaterial = new THREE.MeshStandardMaterial({ 
                map: wallTexture,      
                roughness: 0.9,        
                side: THREE.DoubleSide
            });

            const backWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 5), wallMaterial); 
            backWall.position.set(0, 2.5, -5);
            backWall.receiveShadow = true;
            backWall.name = "wall"; 
            scene.add(backWall);

            const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(10, 5), wallMaterial); 
            leftWall.position.set(-5, 2.5, 0);
            leftWall.rotation.y = Math.PI / 2;
            leftWall.receiveShadow = true;
            leftWall.name = "wall"; 
            scene.add(leftWall);

            const steelTexture = textureLoader.load('stainless steel.jpg');
            const counterMaterial = new THREE.MeshStandardMaterial({ 
                map: steelTexture
            }); 
            const counter = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 2), counterMaterial); 
            counter.position.set(0, 0.5, 0); 
            counter.castShadow = true;
            counter.receiveShadow = true;
            scene.add(counter);

            const cupMat = new THREE.MeshStandardMaterial({ color: 0xE74C3C, roughness: 0.2, metalness: 0.1 }); 
            const cup = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.4, 32), cupMat);
            cup.position.set(-0.8, 1.2, 0);
            cup.castShadow = true;
            scene.add(cup);

            const plateMat = new THREE.MeshStandardMaterial({ color: 0xFFF59D, roughness: 0.1 }); 
            const plate = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.05, 32), plateMat);
            plate.position.set(0.5, 1.025, -0.4);
            plate.castShadow = true;
            scene.add(plate);
        }

        // Exercise 2: The Humanoid Robot
        function Exercise2_Robot() {
            robotState.material = new THREE.MeshStandardMaterial({ color: 0x2980b9, roughness: 0.3, metalness: 0.6 });
            const jointMaterial = new THREE.MeshStandardMaterial({ color: 0x95a5a6, roughness: 0.2, metalness: 0.8 }); 
            const highlightMaterial = new THREE.MeshStandardMaterial({ color: 0xf1c40f, roughness: 0.4, metalness: 0.5 });

            const robotGroup = new THREE.Group();
            robotGroup.position.set(0, 1.7, -1.4); 
            scene.add(robotGroup);

            const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 0.6, 16, 32), robotState.material);
            torso.position.set(0, -0.2, 0);
            torso.castShadow = true;
            robotGroup.add(torso);

            const headGroup = new THREE.Group();
            headGroup.position.set(0, 0.6, 0);
            robotGroup.add(headGroup);

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.5), robotState.material);
            head.castShadow = true;
            headGroup.add(head);

            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x00ffff, emissiveIntensity: 2 });
            const eyeGeom = new THREE.SphereGeometry(0.06, 16, 16);
            
            const eyeL = new THREE.Mesh(eyeGeom, eyeMat);
            eyeL.position.set(-0.12, 0.05, 0.26);
            headGroup.add(eyeL);

            const eyeR = new THREE.Mesh(eyeGeom, eyeMat);
            eyeR.position.set(0.12, 0.05, 0.26);
            headGroup.add(eyeR);

            function createArm(isLeft) {
                const sign = isLeft ? -1 : 1;
                const shoulder = new THREE.Group();
                shoulder.position.set(sign * 0.5, 0.3, 0); 
                shoulder.add(new THREE.AxesHelper(0.4));
                robotGroup.add(shoulder);

                const shoulderJoint = new THREE.Mesh(new THREE.SphereGeometry(0.15, 32, 32), jointMaterial);
                shoulder.add(shoulderJoint);

                const upperArm = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.4, 16, 16), robotState.material);
                upperArm.position.y = -0.28; 
                upperArm.castShadow = true;
                shoulder.add(upperArm);

                const elbow = new THREE.Group();
                elbow.position.set(0, -0.56, 0); 
                elbow.add(new THREE.AxesHelper(0.3));
                shoulder.add(elbow); 

                const elbowJoint = new THREE.Mesh(new THREE.SphereGeometry(0.12, 32, 32), jointMaterial);
                elbow.add(elbowJoint);

                const forearm = new THREE.Mesh(new THREE.CapsuleGeometry(0.07, 0.35, 16, 16), robotState.material);
                forearm.position.y = -0.245; 
                forearm.castShadow = true;
                elbow.add(forearm);

                const hand = new THREE.Group();
                hand.position.set(0, -0.49, 0); 
                hand.add(new THREE.AxesHelper(0.2));
                elbow.add(hand);

                const handBase = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.08, 0.15), highlightMaterial);
                handBase.position.y = -0.04;
                handBase.castShadow = true;
                hand.add(handBase);

                const fingerGeom = new THREE.BoxGeometry(0.04, 0.15, 0.1);
                const finger1 = new THREE.Mesh(fingerGeom, highlightMaterial);
                finger1.position.set(-0.07, -0.15, 0);
                finger1.castShadow = true;
                hand.add(finger1);

                const finger2 = new THREE.Mesh(fingerGeom, highlightMaterial);
                finger2.position.set(0.07, -0.15, 0);
                finger2.castShadow = true;
                hand.add(finger2);

                return { shoulder, elbow };
            }

            const armR = createArm(false);
            robotState.shoulderR = armR.shoulder;
            robotState.elbowR = armR.elbow;

            const armL = createArm(true);
            robotState.shoulderL = armL.shoulder;
            robotState.elbowL = armL.elbow;

            function createLeg(isLeft) {
                const sign = isLeft ? -1 : 1;
                const hip = new THREE.Group();
                hip.position.set(sign * 0.22, -0.7, 0); 
                robotGroup.add(hip);

                const thigh = new THREE.Mesh(new THREE.CapsuleGeometry(0.09, 0.35, 16, 16), robotState.material);
                thigh.position.y = -0.26;
                thigh.castShadow = true;
                hip.add(thigh);

                const knee = new THREE.Group();
                knee.position.set(0, -0.52, 0);
                hip.add(knee);

                const kneeJoint = new THREE.Mesh(new THREE.SphereGeometry(0.11, 32, 32), jointMaterial);
                knee.add(kneeJoint);

                const calf = new THREE.Mesh(new THREE.CapsuleGeometry(0.08, 0.35, 16, 16), robotState.material);
                calf.position.y = -0.26;
                calf.castShadow = true;
                knee.add(calf);

                const foot = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.3), highlightMaterial);
                foot.position.set(0, -0.5, 0.05); 
                foot.castShadow = true;
                knee.add(foot);

                return { hip, knee };
            }

            const legR = createLeg(false);
            robotState.hipR = legR.hip;
            robotState.kneeR = legR.knee;

            const legL = createLeg(true);
            robotState.hipL = legL.hip;
            robotState.kneeL = legL.knee;
        }

        // Exercise 3: Lighting and Shadows
        function Exercise3_Lighting() {
            ambientLight = new THREE.AmbientLight(0xffffff, 1); 
            scene.add(ambientLight);

            mainLight = new THREE.SpotLight(0xffffff, 60);
            mainLight.position.set(0, 4, 0);
            mainLight.castShadow = true; 
            mainLight.shadow.mapSize.width = 2048; 
            mainLight.shadow.mapSize.height = 2048;
            mainLight.shadow.bias = -0.0005; 
            scene.add(mainLight);

            gui = new GUI(); 
            const lightFolder = gui.addFolder('Lighting');
            lightFolder.add(ambientLight, 'intensity', 0, 2, 0.1).name('AmbientLight Intensity');
            lightFolder.add(mainLight, 'intensity', 0, 200, 1).name('MainLight Intensity');
            lightFolder.addColor({color: 0xffffff}, 'color').name('MainLight Color').onChange((val) => {
                mainLight.color.set(val);
            });

            if (robotState.material) {
                const matFolder = gui.addFolder('Robot Material');
                matFolder.add(robotState.material, 'metalness', 0, 1, 0.01);
                matFolder.add(robotState.material, 'roughness', 0, 1, 0.01);
                matFolder.addColor({color: 0x2980b9}, 'color').name('Body Color').onChange((val) => {
                    robotState.material.color.set(val);
                });
            }

            const debugFolder = gui.addFolder('Debug');
            const debugSettings = { showHelpers: false };
            debugFolder.add(debugSettings, 'showHelpers').name('Show Helpers').onChange((visible) => {
                scene.traverse((object) => {
                    if (object instanceof THREE.AxesHelper || object instanceof THREE.SpotLightHelper) {
                        object.visible = visible;
                    }
                });
            });
            scene.traverse((object) => {
                if (object instanceof THREE.AxesHelper || object instanceof THREE.SpotLightHelper) {
                    object.visible = false;
                }
            });
        }

        // Exercise 4: Animation and Interaction
        function Exercise4_Animation() {
            controls = new OrbitControls(camera, renderer.domElement);
            controls.maxPolarAngle = Math.PI / 2;
            controls.target.set(0, 1, 0);

            const animFolder = gui.addFolder('Right Arm Animation');
            animFolder.add(animSettings, 'enableFK').name('Auto Animate (FK)').listen();
            
            animFolder.add(animSettings, 'shoulderRX', -Math.PI, Math.PI, 0.01)
                .name('Shoulder X')
                .listen() 
                .onChange((val) => {
                    if (!animSettings.enableFK) robotState.shoulderR.rotation.x = val;
                });
                
            animFolder.add(animSettings, 'elbowRX', -150 * (Math.PI / 180), 0, 0.01)
                .name('Elbow X')
                .listen()
                .onChange((val) => {
                    if (!animSettings.enableFK) robotState.elbowR.rotation.x = val;
                });
        }

        function animate() {
            requestAnimationFrame(animate); 

            if (robotState.shoulderR && robotState.elbowR) {
                if (animSettings.enableFK) {
                    const time = Date.now() * 0.003; 
                    const motion = (Math.sin(time) + 1) / 2; 

                    const targetShoulder = -0.5; 
                    const targetElbow = -0.45;    
                    const shoulderLift = 0.3;
                    const elbowLift = 0.7;

                    const shoulderAngle = targetShoulder - (motion * shoulderLift); 
                    const elbowAngle = targetElbow - (motion * elbowLift); 

                    robotState.shoulderR.rotation.x = shoulderAngle;
                    robotState.elbowR.rotation.x = elbowAngle;
                    
                    animSettings.shoulderRX = shoulderAngle;
                    animSettings.elbowRX = elbowAngle;
                } else {
                    robotState.shoulderR.rotation.x = animSettings.shoulderRX;
                    robotState.elbowR.rotation.x = animSettings.elbowRX;
                }
            }

            controls.update();              
            renderer.render(scene, camera); 
        }

        Exercise1_Kitchen(); 
        Exercise2_Robot();
        Exercise3_Lighting();
        Exercise4_Animation();
        animate();
    </script>
</body>
</html>
