<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exercise3 LambertianDirectionalLightingonElevationMaps</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; color: #fff; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; border: 1px solid #555; width: 280px;}
        #upload-btn { background: #4CAF50; color: white; padding: 10px; text-align: center; cursor: pointer; border-radius: 4px; margin-bottom: 15px; font-weight: bold;}
        #file-input { display: none; }
        #media-info { font-size: 12px; color: #aaa; margin-bottom: 10px; word-break: break-all;}
        video { display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="upload-btn" onclick="document.getElementById('file-input').click()">📁 Load Image or Video</div>
        <input type="file" id="file-input" accept="image/*,video/*">
        <div id="media-info">No media loaded.</div>
    </div>

    <div id="container"></div>

    <script type="x-shader/x-vertex" id="vertexshader">
        uniform sampler2D u_image;
        uniform int u_colorSpace;
        uniform int u_channel; 
        uniform float u_elevationScale; 
        uniform vec2 u_texelSize;
        
        varying vec3 vColor;
        varying vec3 vNormal;

        const mat3 LIN_TO_XYZ = mat3(
            0.4124564, 0.2126729, 0.0193339,
            0.3575761, 0.7151522, 0.1191920,
            0.1804375, 0.0721750, 0.9503041
        );
        const vec3 D65 = vec3(0.95047, 1.0000, 1.08883);

        vec3 sRGBtoLinear(vec3 c) {
            vec3 b1 = c / 12.92;
            vec3 b2 = pow((c + 0.055) / 1.055, vec3(2.4));
            return mix(b1, b2, step(0.04045, c));
        }

        float f_lab(float t) {
            float delta = 6.0 / 29.0;
            if (t > delta * delta * delta) return pow(t, 1.0 / 3.0);
            return t / (3.0 * delta * delta) + 4.0 / 29.0;
        }

        vec3 RGBtoHSV(vec3 c) {
            float cmax = max(c.r, max(c.g, c.b));
            float cmin = min(c.r, min(c.g, c.b));
            float delta = cmax - cmin;
            float H = 0.0;
            if (delta == 0.0) H = 0.0;
            else if (cmax == c.r) H = mod((c.g - c.b) / delta, 6.0);
            else if (cmax == c.g) H = (c.b - c.r) / delta + 2.0;
            else H = (c.r - c.g) / delta + 4.0;
            H *= 60.0;
            if (H < 0.0) H += 360.0;
            float S = (cmax == 0.0) ? 0.0 : delta / cmax;
            return vec3(H / 360.0, S, cmax);
        }

        float getHeightAtUV(vec2 sampleUV) {
            vec3 sRGB = texture2D(u_image, sampleUV).rgb;
            float h = 0.0;
            if (u_colorSpace == 0) {
                h = (u_channel == 0) ? sRGB.r : ((u_channel == 1) ? sRGB.g : sRGB.b);
            } else if (u_colorSpace == 1) {
                vec3 hsv = RGBtoHSV(sRGB);
                h = (u_channel == 0) ? hsv.x : ((u_channel == 1) ? hsv.y : hsv.z);
            } else {
                vec3 XYZ = LIN_TO_XYZ * sRGBtoLinear(sRGB);
                if (u_colorSpace == 2) {
                    h = (u_channel == 0) ? XYZ.x : ((u_channel == 1) ? XYZ.y : XYZ.z);
                } else if (u_colorSpace == 3) {
                    float sum = XYZ.x + XYZ.y + XYZ.z;
                    h = (u_channel == 0) ? ((sum==0.0)?0.0:XYZ.x/sum) : ((u_channel == 1) ? ((sum==0.0)?0.0:XYZ.y/sum) : XYZ.y);
                } else {
                    float fx = f_lab(XYZ.x / D65.x), fy = f_lab(XYZ.y / D65.y), fz = f_lab(XYZ.z / D65.z);
                    float L = 116.0 * fy - 16.0, a = 500.0 * (fx - fy), b = 200.0 * (fy - fz);
                    if (u_colorSpace == 4) {
                        h = (u_channel == 0) ? L/100.0 : ((u_channel == 1) ? clamp((a+128.0)/256.0,0.0,1.0) : clamp((b+128.0)/256.0,0.0,1.0));
                    } else if (u_colorSpace == 5) {
                        float C = sqrt(a*a + b*b), hh = atan(b, a);
                        h = (u_channel == 0) ? L/100.0 : ((u_channel == 1) ? clamp(C/128.0,0.0,1.0) : clamp((hh+3.14159)/6.28318,0.0,1.0));
                    }
                }
            }
            return h * u_elevationScale;
        }

        void main() {
            vColor = texture2D(u_image, uv).rgb;

            float epsU = u_texelSize.x;
            float epsV = u_texelSize.y;
            
            float hL = getHeightAtUV(uv + vec2(-epsU, 0.0));
            float hR = getHeightAtUV(uv + vec2(epsU, 0.0));
            float hD = getHeightAtUV(uv + vec2(0.0, -epsV));
            float hU = getHeightAtUV(uv + vec2(0.0, epsV));

            float dhdu = (hR - hL) / (2.0 * epsU);
            float dhdv = (hU - hD) / (2.0 * epsV);

            float normalStrength = 0.2; 
            vNormal = normalize(vec3(-dhdu * normalStrength, -dhdv * normalStrength, 1.0));

            float currentHeight = getHeightAtUV(uv);
            vec3 newPosition = position;
            newPosition.z += currentHeight;
            
            gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
        }
    </script>

    <script type="x-shader/x-fragment" id="fragmentshader">
        varying vec3 vColor;
        varying vec3 vNormal;
        
        uniform vec3 u_lightDir;
        uniform vec3 u_lightColor;
        uniform float u_kd;
        uniform vec3 u_ambientColor;
        uniform float u_ka;

        void main() {
            vec3 N = normalize(vNormal);
            vec3 L = normalize(u_lightDir);

            float NdotL = max(0.0, dot(N, L));

            vec3 diffuse = u_lightColor * u_kd * NdotL;

            vec3 ambient = u_ambientColor * u_ka;

            vec3 finalLighting = ambient + diffuse;
            gl_FragColor = vec4(vColor * finalLighting, 1.0);
        }
    </script>

    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        let camera, scene, renderer, controls;
        let elevationMaterial, elevationMesh, referencePlane;
        let mediaTexture = null;
        let videoElement = document.createElement('video');
        
        const SEGMENTS = 256; 

        function init() {
            const container = document.getElementById('container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 10);

            scene.add(new THREE.AxesHelper(5));
            scene.add(new THREE.GridHelper(10, 20, 0x888888, 0x444444));

            elevationMaterial = new THREE.ShaderMaterial({
                uniforms: { 
                    u_image: { value: null }, 
                    u_colorSpace: { value: 0 },
                    u_channel: { value: 0 }, 
                    u_elevationScale: { value: 2.0 },
                    u_texelSize: { value: new THREE.Vector2(1.0 / SEGMENTS, 1.0 / SEGMENTS) },

                    u_lightDir: { value: new THREE.Vector3(1.0, 1.0, 1.0).normalize() },
                    u_lightColor: { value: new THREE.Color(0xffffff) },
                    u_kd: { value: 1.0 },
                    u_ambientColor: { value: new THREE.Color(0xffffff) },
                    u_ka: { value: 0.3 }
                },
                vertexShader: document.getElementById('vertexshader').textContent,
                fragmentShader: document.getElementById('fragmentshader').textContent,
                side: THREE.DoubleSide
            });

            const geometry = new THREE.PlaneGeometry(8, 8, SEGMENTS, SEGMENTS);
            elevationMesh = new THREE.Mesh(geometry, elevationMaterial);
            elevationMesh.rotation.x = -Math.PI / 2; 
            elevationMesh.visible = false; 
            scene.add(elevationMesh);

            const refGeometry = new THREE.PlaneGeometry(8, 8);
            const refMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
            referencePlane = new THREE.Mesh(refGeometry, refMaterial);
            referencePlane.rotation.x = -Math.PI / 2; 
            referencePlane.position.y = -1.0; 
            referencePlane.visible = false; 
            scene.add(referencePlane);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; 
            container.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            setupGUI();
            document.getElementById('file-input').addEventListener('change', handleFileUpload);
            window.addEventListener('resize', onWindowResize);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const url = URL.createObjectURL(file);
            document.getElementById('media-info').innerText = `Loaded: ${file.name}`;

            if (mediaTexture) mediaTexture.dispose();

            if (file.type.startsWith('video/')) {
                videoElement.src = url;
                videoElement.crossOrigin = 'anonymous';
                videoElement.loop = true;
                videoElement.muted = false;
                
                videoElement.onloadeddata = () => {
                    mediaTexture = new THREE.VideoTexture(videoElement);
                    updateTextureAndScale(mediaTexture, videoElement.videoWidth, videoElement.videoHeight);
                    videoElement.play();
                };
            } else if (file.type.startsWith('image/')) {
                videoElement.pause();
                const img = new Image();
                img.onload = () => {
                    mediaTexture = new THREE.Texture(img);
                    mediaTexture.needsUpdate = true;
                    updateTextureAndScale(mediaTexture, img.width, img.height);
                    URL.revokeObjectURL(url);
                };
                img.src = url;
            }
        }

        function updateTextureAndScale(tex, width, height) {
            elevationMaterial.uniforms.u_image.value = tex;
            
            if(referencePlane) {
                referencePlane.material.map = tex;
                referencePlane.material.needsUpdate = true;
            }

            elevationMesh.visible = true;
            referencePlane.visible = true;

            const aspect = height / width;
            if(width > height) {
                elevationMesh.scale.set(1, aspect, 1);
                referencePlane.scale.set(1, aspect, 1);
            } else {
                elevationMesh.scale.set(1/aspect, 1, 1);
                referencePlane.scale.set(1/aspect, 1, 1);
            }
        }

        function setupGUI() {
            const channelNames = {
                0: ['R', 'G', 'B'],
                1: ['Hue (H)', 'Saturation (S)', 'Value (V)'],
                2: ['X', 'Y', 'Z'],
                3: ['x', 'y', 'Y (Luminance)'],
                4: ['Lightness (L*)', 'a* (Green-Red)', 'b* (Blue-Yellow)'],
                5: ['Lightness (L*)', 'Chroma (C*)', 'Hue (h)']
            };

            const guiParams = {
                colorSpace: 0,
                channel: 0,
                elevationScale: 2.0,

                lightX: 1.0,
                lightY: 1.0,
                lightZ: 1.0,
                ambientPower: 0.3,
                diffusePower: 1.0,
                
                pausePlay: function () {
                    if (videoElement.src) {
                        videoElement.paused ? videoElement.play() : videoElement.pause();
                    }
                },
                add10sec: function () {
                    if (videoElement.src) videoElement.currentTime += 10;
                }
            };
            
            const gui = new GUI({ container: document.getElementById('ui'), width: 250 });

            gui.add(guiParams, 'colorSpace', { 'sRGB': 0, 'HSV': 1, 'CIE XYZ': 2, 'CIE xyY': 3, 'CIE LAB': 4, 'CIE LCH': 5 })
               .name('Color Space')
               .onChange(val => {
                   elevationMaterial.uniforms.u_colorSpace.value = parseInt(val);
                   updateChannelDropdown(parseInt(val)); 
               });

            const channelFolder = gui.addFolder('Channel Selection'); 
            let channelController = null;

            function updateChannelDropdown(csIndex) {
                const names = channelNames[csIndex];
                const options = {};
                options[names[0]] = 0; options[names[1]] = 1; options[names[2]] = 2;
                
                if (channelController) channelController.destroy();

                guiParams.channel = 0; 
                elevationMaterial.uniforms.u_channel.value = 0;

                channelController = channelFolder.add(guiParams, 'channel', options)
                    .name('Target Channel')
                    .onChange(val => elevationMaterial.uniforms.u_channel.value = parseInt(val));
            }

            updateChannelDropdown(0);
            gui.add(guiParams, 'elevationScale', 0.0, 10.0).name('Elevation Scale')
               .onChange(val => elevationMaterial.uniforms.u_elevationScale.value = val);

            const lightFolder = gui.addFolder('Lighting');
            const updateLightDir = () => {
                const dir = new THREE.Vector3(guiParams.lightX, guiParams.lightY, guiParams.lightZ).normalize();
                elevationMaterial.uniforms.u_lightDir.value.copy(dir);
            };
            lightFolder.add(guiParams, 'lightX', -5.0, 5.0).onChange(updateLightDir);
            lightFolder.add(guiParams, 'lightY', 0.0, 5.0).onChange(updateLightDir);
            lightFolder.add(guiParams, 'lightZ', -5.0, 5.0).onChange(updateLightDir);
            
            lightFolder.add(guiParams, 'ambientPower', 0.0, 1.0).name('Ambient Reflectance')
                .onChange(val => elevationMaterial.uniforms.u_ka.value = val);
            lightFolder.add(guiParams, 'diffusePower', 0.0, 2.0).name('Diffuse Reflectance')
                .onChange(val => elevationMaterial.uniforms.u_kd.value = val);

            const videoFolder = gui.addFolder('Video Controls');
            videoFolder.add(guiParams, 'pausePlay').name('⏯ Pause/Play Video');
            videoFolder.add(guiParams, 'add10sec').name('⏩ Add 10 Seconds');
            videoFolder.open(); 
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(() => {
                controls.update(); 
                renderer.render(scene, camera);
            });
        }

        init();
        animate();
    </script>
</body>
</html>
